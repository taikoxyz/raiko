name: CI Integration test - Reusable

on:
  workflow_call:
    inputs:
      version_name:
        type: string
        required: true
      version_toolchain:
        type: string
        required: true
      taskdb:
        type: string
        required: true

env:
  CI: 1
  CARGO_TERM_COLOR: always
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build-run-integration:
    if: ${{ github.event.pull_request.draft == false }}
    name: Build and run integration
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      TARGET: ${{ inputs.version_name }}
      CI: 1
      MOCK: 1

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ inputs.version_toolchain }}
          profile: minimal

      - name: Setup sccache
        if: inputs.version_name == 'risc0'
        uses: mozilla-actions/sccache-action@054db53350805f83040bf3e6e9b8cf5a139aa7c9 # v0.0.7

      - name: Cache risc0
        if: inputs.version_name == 'risc0'
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: rust-cache-${{ runner.os }}-${{ runner.arch }}
          cache-directories: ~/.cache/risc0

      - name: Install ${{ inputs.version_name }}
        run: make install

      - name: Build ${{ inputs.version_name }} prover
        run: make build

    #  TODO:(petar) re add to CI after fixing sgx directory setup
