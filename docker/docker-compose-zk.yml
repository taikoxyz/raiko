services:
  raiko-zk:
    platform: linux/amd64
    build:
      context: ..
      dockerfile: Dockerfile.zk
    image: docker.io/nethermind/surge-raiko-zk:latest
    container_name: raiko-zk
    network_mode: host
    env_file:
      - .env
    environment:
      ZK: "true"
      SP1_GROTH16_CIRCUIT_PATH: "${HOME}/.sp1/circuits/groth16"
      RAIKO_CONF_DIR: "/raiko/config/devnet"
      BASE_CONFIG_FILE: "config.json"
      BASE_CHAINSPEC_FILE: "chain_spec_list.json"
      HOME: "${HOME}"
    restart: unless-stopped
    runtime: nvidia
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../host/config:/raiko/config
      - /tmp:/tmp
      - ${HOME}/.sp1:${HOME}/.sp1
      - ${HOME}/.risc0:${HOME}/.risc0
    depends_on:
      - redis-zk
  redis-zk:
    image: redis
    container_name: redis-zk
    ports:
      - "6379:6379"