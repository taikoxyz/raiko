
[package]
name = "zisk-guest"
version = "0.1.0"
edition = "2021"

[profile.release]
panic = "abort"
opt-level = "s"
lto = true
codegen-units = 1

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
    'cfg(zisk_hints)',
    'cfg(zisk_hints_debug)',
    'cfg(target_vendor, values("zisk"))',
] }

[[bin]]
name = "zisk-batch"
path = "src/batch.rs"

[[bin]]
name = "zisk-aggregation"
path = "src/aggregation.rs"

[[bin]]
name = "zisk-shasta-aggregation"
path = "src/shasta_aggregation.rs"

[dependencies]
# Core Zisk runtime — v0.16.1
ziskos = { git = "https://github.com/0xPolygonHermez/zisk.git", tag = "v0.16.1" }

# Raiko library - all reth/revm/alloy deps come transitively through this
raiko-lib = { path = "../../../lib", default-features = false, features = [
    "std",
    "zisk",
] }

# Serialization
serde = { version = "1.0", default-features = false, features = ["derive"] }
bincode = { version = "1.3", default-features = false }

# Pin ruint to exact version matching the patch crate
ruint = { version = "=1.17.0", default-features = false }

# KZG precompile: c-kzg still needed for EIP-4844 point evaluation (revm dep).
# blst patched for zisk target (C cross-compilation).
c-kzg = { git = "https://github.com/risc0/c-kzg-4844", tag = "v2.1.5-risczero.0", features = [
    "eip-7594",
] }
#blst = { git = "https://github.com/0xPolygonHermez/zisk-patch-blst.git", tag = "patch-0.3.15-zisk-0.15.0" }

[patch.crates-io]
c-kzg = { git = "https://github.com/risc0/c-kzg-4844", tag = "v2.1.5-risczero.0" }
#blst = { git = "https://github.com/0xPolygonHermez/zisk-patch-blst.git", tag = "patch-0.3.15-zisk-0.15.0" }

# Precompile acceleration patches — use syscalls for crypto operations at the
# compress/field-op level. The 0.15.0 patch tags are compatible with v0.16.0
# ziskos since the underlying syscalls are unchanged.
#tiny-keccak = { git = "https://github.com/0xPolygonHermez/zisk-patch-tiny-keccak.git", tag = "patch-2.0.2-zisk-0.15.0" }
#sha2 = { git = "https://github.com/0xPolygonHermez/zisk-patch-hashes.git", tag = "patch-sha2-0.10.9-zisk-0.15.0" }
# sha3: local patch that calls syscall_keccak_f directly (bypasses keccak crate transitive dep issue)
#sha3 = { path = "patches/sha3" }
#sha3 = { git = "https://github.com/0xPolygonHermez/zisk-patch-hashes.git", tag = "patch-sha3-0.10.8-zisk-0.15.0" }
# k256 patch disabled for batch: ZiskCrypto handles ecrecover via high-level
# syscalls, avoiding the arith256_mod/secp256k1_add pattern that triggers
# intermittent ZisK prover failures ("VerifyEvaluations0").
#k256 = { git = "https://github.com/0xPolygonHermez/zisk-patch-elliptic-curves.git", tag = "patch-k256-0.13.4-zisk-0.15.0" }
#ruint = { git = "https://github.com/0xPolygonHermez/zisk-patch-ruint.git", tag = "patch-1.17.0-zisk-0.15.0" }
