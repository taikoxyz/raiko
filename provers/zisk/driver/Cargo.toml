[package]
name = "zisk-driver"
version = "0.1.0"
edition = "2021"
description = "ZISK agent HTTP client driver for Raiko integration"

[features]
enable = ["dep:zisk-sdk", "dep:zisk-common", "dep:fields"]
gpu = ["enable", "zisk-sdk/gpu"]
cuda = ["gpu"]

[dependencies]
# Workspace dependencies (from main raiko workspace)
serde = { workspace = true }
serde_json = { workspace = true }
serde_with = { workspace = true }
tracing = { workspace = true }
tokio = { workspace = true }
hex = { workspace = true }
bincode = { workspace = true }
reqwest = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
raiko-lib = { workspace = true }

# Minimal external dependencies to avoid conflicts
async-trait = "0.1"
once_cell = "1"
bytemuck = "1"
libc = "0.2"

# Zisk SDK and related dependencies — v0.16.0 (optional, gated behind "enable")
zisk-sdk = { git = "https://github.com/0xPolygonHermez/zisk.git", tag = "v0.16.1", optional = true }
zisk-common = { git = "https://github.com/0xPolygonHermez/zisk.git", tag = "v0.16.1", optional = true }
fields = { git = "https://github.com/0xPolygonHermez/pil2-proofman.git", tag = "v0.16.1", optional = true }
